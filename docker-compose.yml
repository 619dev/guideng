services:
  server:
    image: ${GUIDENG_SERVER_IMAGE:-facilisvelox/guideng-server:latest}
    pull_policy: always
    environment:
      GUIDENG_TOKEN: ${GUIDENG_TOKEN:-}
      GUIDENG_BIND: 0.0.0.0:8080
      GUIDENG_DATABASE_URL: /data/guideng.sqlite3
      GUIDENG_LOG_PATH: /data/guideng.log
      GUIDENG_CORS_ORIGINS: ${GUIDENG_CORS_ORIGINS:-*}
      GUIDENG_AMAP_WEB_JS_API_KEY: ${GUIDENG_AMAP_WEB_JS_API_KEY:-}
      GUIDENG_AMAP_WEB_JS_SECURITY_CODE: ${GUIDENG_AMAP_WEB_JS_SECURITY_CODE:-}
      GUIDENG_AMAP_ANDROID_KEY: ${GUIDENG_AMAP_ANDROID_KEY:-}
      GUIDENG_AMAP_IOS_KEY: ${GUIDENG_AMAP_IOS_KEY:-}
    volumes:
      - guideng-data:/data
    ports:
      - "8080:8080"

  client:
    image: ${GUIDENG_CLIENT_IMAGE:-facilisvelox/guideng-client:latest}
    pull_policy: always
    ports:
      - "3000:80"
    depends_on:
      - server

volumes:
  guideng-data:
